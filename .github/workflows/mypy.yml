name: Mypy type check

on: [ push ]

jobs:
  mypy-checks:
    name: Run Mypy Type Check
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: [ "3.12" ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv pip install --upgrade pip --system
          uv pip install -r requirements-tests.txt --system

      - name: Fetch default branch
        run: |
          echo "Fetching origin/${{ github.event.repository.default_branch }}"
          git fetch origin "${{ github.event.repository.default_branch }}" --depth=1 --no-tags || echo "Warning: could not fetch."

      - name: Determine changed files and run mypy
        shell: bash
        env:
          TARGET_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          echo "Target branch: ${TARGET_BRANCH}"
          echo "Current ref: ${{ github.ref }}"
          echo "Current branch: ${{ github.ref_name }}"

          changed=()
          while IFS= read -r file; do
            changed+=("$file")
          done < <(git diff --name-only --diff-filter=d "origin/$TARGET_BRANCH" HEAD -- '**/*.py' '**/*.pyi')

          if [[ -z "${changed[@]}" ]]; then
            echo "No changed Python files compared to origin/$TARGET_BRANCH."
            exit 0
          fi

          echo "Changed Python files: ${changed[@]}"
          mypy "${changed[@]}" --install-types --non-interactive --follow-imports=silent
