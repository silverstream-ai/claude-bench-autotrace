requires-python = ">= 3.12"

[tool.ruff]
line-length = 120
indent-width = 4
target-version = "py312"
respect-gitignore = true

[tool.ruff.lint]
select = [
    "E",     # pycodestyle
    "F",     # pyflakes
    "I",     # isort
    "B",     # bugbear
    "SIM",   # simplify
    "C90",   # mccabe
    "N",     # pep8-naming
    "UP",    # pyupgrade
    "RUF",   # ruff-specific rules
    "PTH",   # use pathlib
    "ERA",   # eradicate commented out code
    "PL",    # pylint
    "ICN",   # import conventions
    "ASYNC", # ASYNC rule set
    "UP006", # List typing -> list https://docs.astral.sh/ruff/rules/non-pep585-annotation/
    "TID252", # ban relative imports
]
ignore = [
    "PLR2004", # Ignore magic numbers for now
    "ERA001",  # Ignore commented code for now - we'll clean this up separately
    "PTH123",  # Ignore open() -> Path.open() for now
    "PTH118",  # Ignore os.path.join -> Path operator for now
    "PTH120",  # Ignore os.path.dirname -> Path.parent for now
    "PTH110",  # Ignore os.path.exists -> Path.exists for now
    "PTH103",  # Ignore os.makedirs -> Path.mkdir for now
    "PTH119",  # Ignore os.path.basename -> Path.name for now
    "PTH122",  # Ignore os.path.splitext -> Path.suffix for now
    "PTH202",  # Ignore os.path.getsize -> Path.stat().st_size for now
    "PTH207",  # Ignore glob -> Path.glob for now
    "RUF012",  # Ignore mutable class attributes warning
    "RUF013",  # Ignore implicit Optional warning
    "RUF001",  # Ignore ambiguous quote warning
    "RUF005",  # Ignore iterable unpacking suggestion
    "RUF015",  # Ignore next() over slice suggestion
    "PLR0911", # Ignore too many return statements
    "PLR0912", # Ignore too many branches
    "PLR0915", # Ignore too many statements
    "PLR1722", # Ignore sys.exit suggestion
    "N815",    # Ignore mixed case variable names in class scope
    "N818",    # Ignore missing Error suffix in exception names
    "N802",    # Ignore function name should be lowercase
    "PLW0603", # Ignore global statement usage warning
    "PLW2901", # Ignore loop variable overwritten warning
    "PLE1205", # Ignore too many arguments for logging format string
    "UP022",   # Ignore capture_output suggestion
]

# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[tool.ruff.lint.mccabe]
# Unlike Flake8, default to a complexity level of 10.
max-complexity = 12

[tool.ruff.lint.per-file-ignores]
"__init__.py" = [
    "F401", # Ignore unused imports
    "E402", # Ignore module level import not at top of file
]
"tests/**/*.py" = ["N802", "N803", "PLR2004", "PLW2901", "E501"]

[tool.ruff.lint.isort]
known-first-party = ["claude_autotrace_hook", "cc_tracer_lib", "notifications"]
combine-as-imports = true
force-single-line = false
force-sort-within-sections = true
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]
order-by-type = true
from-first = true
force-wrap-aliases = true

[tool.ruff.lint.flake8-quotes]
docstring-quotes = "double"
inline-quotes = "single"
multiline-quotes = "double"

[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports = "all"

[tool.ruff.lint.flake8-annotations]
allow-star-arg-any = true
suppress-none-returning = true

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.pyupgrade]
# Keep runtime typing to avoid breaking changes
keep-runtime-typing = true

[tool.ruff.lint.flake8-implicit-str-concat]
allow-multiline = true

[tool.ruff.lint.pylint]
max-args = 10
max-statements = 50
allow-magic-value-types = ["int", "str", "float"]
max-branches = 15  # Increased from default to reduce noise

[tool.ruff.lint.pep8-naming]
# Allow some common abbreviations
classmethod-decorators = [
    "classmethod",
    "validator",
    "root_validator",
]

[tool.mypy]
strict = true
disable_error_code = ["union-attr", "no-untyped-call", "import-untyped", "unused-ignore"]
plugins = ['pydantic.mypy']
mypy_path = ["$MYPY_CONFIG_FILE_DIR/claude_autotrace_hook"]
cache_dir = ".mypy_cache"
